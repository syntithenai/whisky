name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build static site
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          ADSENSE_CLIENT_ID: ${{ secrets.ADSENSE_CLIENT_ID }}
          ADSENSE_SLOT_IN_CONTENT: ${{ secrets.ADSENSE_SLOT_IN_CONTENT }}
          ADSENSE_SLOT_MID_CONTENT: ${{ secrets.ADSENSE_SLOT_MID_CONTENT }}
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%/*}"
          if [[ "$REPO_NAME" == "${OWNER_NAME}.github.io" ]]; then
            BASE_PATH="/"
            SITE_URL="https://$REPO_NAME"
          else
            BASE_PATH="/$REPO_NAME"
            SITE_URL="https://$OWNER_NAME.github.io"
          fi
          echo "Using base path: $BASE_PATH"
          echo "Using site URL: $SITE_URL"
          python3 scripts/build_github_pages.py --base-path "$BASE_PATH" --site-url "$SITE_URL"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify SEO artifacts
        run: |
          set -euo pipefail
          test -s build/github-pages/sitemap.xml
          test -s build/github-pages/robots.txt
          test -s build/github-pages/ads.txt
          echo "Verified sitemap, robots, and ads files in build/github-pages"
          sed -n '1,5p' build/github-pages/ads.txt
          sed -n '1,5p' build/github-pages/robots.txt
          sed -n '1,5p' build/github-pages/sitemap.xml
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/github-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4